# =============================================
# TMUX КОНФИГУРАЦИЯ ДЛЯ NEOVIM ИНТЕГРАЦИИ
# =============================================

# Основные настройки
set -g default-command "/usr/bin/env zsh"
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# True Color поддержка
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Внешний вид
set -g status-style bg=black
set -g set-clipboard on
set -g allow-rename off
set -g detach-on-destroy off
set -g renumber-windows on
bind-key C-a last-window

# Навигация между панелями (как в Vim)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Изменение размера панелей
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Создание панелей
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane

# Быстрое создание панелей для Neovim (Ctrl+A P)
bind-key P run-shell "~/.config/tmux/create_panes.sh"

# СТАТУС-БАР (Добавлена ветка Git)
set -g status-left "#[fg=green]#S #[fg=blue]#I:#P"
set -g status-right "#[fg=cyan]%d %b %Y #[fg=white]%H:%M #[fg=yellow]#(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'no git')"
set -g status-interval 60

# Цвета панелей
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39

# История прокрутки
set -g history-limit 50000

# Уведомления
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off
set -g bell-action none

# Синхронизация панелей
bind C-s set-window-option synchronize-panes

# Быстрая перезагрузка конфига
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# =============================================
# ИНТЕГРАЦИЯ С СИСТЕМНЫМ БУФЕРОМ ОБМЕНА
# =============================================
# Копирование выделенного мышью в системный буфер
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard" \; send-keys -X copy-pipe-and-cancel "wl-copy" 2>/dev/null

# Вставка из системного буфера
bind -n C-S-v run-shell "xclip -selection clipboard -o 2>/dev/null || wl-paste 2>/dev/null | tmux load-buffer - ; tmux paste-buffer"
