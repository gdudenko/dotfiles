# =============================================
# TMUX КОНФИГУРАЦИЯ ДЛЯ NEOVIM ИНТЕГРАЦИИ
# =============================================

# Основные настройки
set -g default-command "/usr/bin/env zsh"
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g status-style bg=black
set -g set-clipboard on
set -g allow-rename off
set -g detach-on-destroy off
set -g renumber-windows on

bind-key C-a last-window

# Навигация между панелями (как в Vim)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Изменение размера панелей
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Создание панелей
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane

# Быстрое создание панелей для Neovim (Ctrl+A P)
bind-key P run-shell "~/.config/tmux/create_panes.sh"

# Статус-бар с информацией
set -g status-left "#[fg=green]#S #[fg=blue]#I:#P"
set -g status-right "#[fg=cyan]%d %b %Y #[fg=white]%H:%M"
set -g status-interval 60

# Цвета панелей
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39

# История прокрутки
set -g history-limit 10000

# Уведомления
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off
set -g bell-action none

# Синхронизация панелей
bind C-s set-window-option synchronize-panes

# Быстрая перезагрузка конфига
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# =============================================
# ИНТЕГРАЦИЯ С СИСТЕМНЫМ БУФЕРОМ ОБМЕНА
# =============================================

# Копирование выделенного мышью в системный буфер (xclip)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# Вставка из системного буфера по Shift+Insert (как в терминалах)
#bind -n S-Insert run-shell "xclip -selection clipboard -o | tmux load-buffer - ; tmux paste-buffer"

# Альтернатива: вставка по Ctrl+Shift+V (если нужно)
bind -n C-S-v run-shell "xclip -selection clipboard -o | tmux load-buffer - ; tmux paste-buffer"

# Если предпочитаете правую кнопку мыши для вставки:
#bind -n MouseDown3Pane run-shell "xclip -selection clipboard -o | tmux load-buffer - ; tmux paste-buffer"
